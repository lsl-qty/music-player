<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>音乐播放器 - Web实验2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        .player {
            width: 360px;
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }
        .top {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 15px;
        }
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin: 0 auto 20px;
            border: 3px solid #fff;
        }
        .cover.rotate {
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info h3 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        .info p {
            color: #ccc;
            font-size: 14px;
        }
        .progress {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 18px 0;
        }
        #progressBar {
            flex: 1;
            height: 5px;
            cursor: pointer;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        button {
            padding: 9px 14px;
            border: none;
            border-radius: 10px;
            background: #0f3460;
            color: white;
            cursor: pointer;
        }
        .volume {
            margin-bottom: 15px;
            font-size: 14px;
        }
        .playlist {
            text-align: left;
            font-size: 14px;
        }
        .playlist h4 {
            color: #ccc;
            margin-bottom: 8px;
        }
        #list li {
            list-style: none;
            padding: 8px;
            background: #0f3460;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
        }
        #list li.active {
            background: #e94560;
        }
    </style>
</head>
<body>

<div class="player">
    <div class="top">学号：______  姓名：______</div>
    <div class="cover" id="cover"></div>
    <div class="info">
        <h3 id="songName">歌曲名</h3>
        <p id="singer">歌手</p>
    </div>

    <div class="progress">
        <span id="current">00:00</span>
        <input type="range" id="progressBar" value="0">
        <span id="duration">00:00</span>
    </div>

    <div class="controls">
        <button id="prev">上一曲</button>
        <button id="playBtn">播放</button>
        <button id="next">下一曲</button>
    </div>

    <div class="volume">
        音量：<input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
    </div>

    <div class="playlist">
        <h4>播放列表</h4>
        <ul id="list"></ul>
    </div>
</div>

<audio id="audio">

<script>
// ========== 改学号姓名 ==========
const myId = "24215220117";
const myName = "李松岭";
document.querySelector(".top").innerText = `学号：${myId}  姓名：${myName}`;

// ==========================
// 1、2、3 首完全一样！
// ==========================
const playlist = [
    {
        name: "Coming Home",
        singer: "Dash Berlin/Bo Bruce",
        url: "music2.mp3",
        cover: "bg0.png"
    },
    {
        name: "Friendships",
        singer: "Pascal Letoublon",
        url: "music0.mp3",
        cover: "bg1.png"
    },
    {
        name: "Kiss Fight",
        singer: "Tulpa",
        url: "music1.mp3",
        cover: "bg3.png"
    }
];

const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const songName = document.getElementById("songName");
const singer = document.getElementById("singer");
const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const progressBar = document.getElementById("progressBar");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const volume = document.getElementById("volume");
const list = document.getElementById("list");

let currentIndex = 0;

function initList() {
    list.innerHTML = "";
    playlist.forEach((item, i) => {
        let li = document.createElement("li");
        li.innerText = `${i+1}. ${item.name}`;
        li.onclick = () => { currentIndex=i; loadSong(); audio.play(); updateUI(); };
        if(i===currentIndex) li.classList.add("active");
        list.appendChild(li);
    });
}

function loadSong() {
    let s = playlist[currentIndex];
    audio.src = s.url;
    songName.innerText = s.name;
    singer.innerText = s.singer;
    cover.style.backgroundImage = `url(${s.cover})`;
    initList();
}

function updateUI() {
    if(audio.paused) {
        playBtn.innerText = "播放";
        cover.classList.remove("rotate");
    } else {
        playBtn.innerText = "暂停";
        cover.classList.add("rotate");
    }
}

function format(t) {
    let m = Math.floor(t/60).toString().padStart(2,"0");
    let s = Math.floor(t%60).toString().padStart(2,"0");
    return m+":"+s;
}

playBtn.onclick = () => {
    audio.paused ? audio.play() : audio.pause();
    updateUI();
};

prevBtn.onclick = () => {
    currentIndex = (currentIndex -1 + playlist.length) % playlist.length;
    loadSong(); audio.play(); updateUI();
};

nextBtn.onclick = () => {
    currentIndex = (currentIndex +1) % playlist.length;
    loadSong(); audio.play(); updateUI();
};

audio.ontimeupdate = () => {
    progressBar.max = audio.duration || 0;
    progressBar.value = audio.currentTime;
    current.innerText = format(audio.currentTime);
};

audio.onloadedmetadata = () => {
    duration.innerText = format(audio.duration);
};

progressBar.oninput = () => {
    audio.currentTime = progressBar.value;
};

volume.oninput = () => {
    audio.volume = volume.value;
};

audio.onended = () => { nextBtn.click(); };

loadSong();
initList();
</script>
</body>
</html>
